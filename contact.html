---
layout: default
title: Contact
description: Get in touch with Jacob Pearson.
permalink: /contact/
---

<div class="container">
  <div class="blog-header">
    <h1>Get in touch</h1>
    <p>
      Fill in the form below, or reach me directly on <a href="https://www.linkedin.com/in/jacobpearson" target="_blank" style="color:var(--accent);">LinkedIn</a>
      or at <a href="mailto:jacob@jacobpearson.com" style="color:var(--accent);">jacob@jacobpearson.com</a>.
    </p>
  </div>

  <form id="contact-form" action="https://formspree.io/f/mkoenbjv" method="POST" class="contact-form">
    {% raw %}<input name="subject" type="hidden" value="New submission from {{ name }}" />{% endraw %}
    <input type="text" name="_gotcha" style="display:none" />

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
    </div>
    <button type="submit" class="btn-primary">Send message →</button>
  </form>
</div>

<script src="https://www.google.com/recaptcha/api.js?render=6Lfl9e8sAAAAAKW4FJuwGK2aaEWdlWZfO1wrk_8H"></script>
<script>
  document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    grecaptcha.ready(function() {
      grecaptcha.execute('6Lfl9e8sAAAAAKW4FJuwGK2aaEWdlWZfO1wrk_8H', { action: 'submit' }).then(function(token) {
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'g-recaptcha-response';
        input.value = token;
        form.appendChild(input);
        form.submit();
      });
    });
  });
</script>
