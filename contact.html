<div class="container">
  <div class="blog-header">
    <h1>Get in touch</h1>
    <p>
      Fill in the form below, or reach me directly on <a href="https://www.linkedin.com/in/jacobpearson" target="_blank" style="color:var(--accent);">LinkedIn</a>
      or at <a href="mailto:jacob@jacobpearson.com" style="color:var(--accent);">jacob@jacobpearson.com</a>.
    </p>
  </div>

  <form action="https://formspree.io/f/mkoenbjv" method="POST" class="contact-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
    </div>
    <button type="submit" class="btn-primary">Send message →</button>
  </form>
</div>
